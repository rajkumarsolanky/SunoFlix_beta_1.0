<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details - SunoFlix</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <h1>Sunoflix</h1>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="movies.html">Movies</a></li>
                <li><a href="browse.html">Browse</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="profile.html" class="profile-link">
                    <i class="fas fa-user"></i>
                </a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Hero Section with Loading State -->
        <section class="movie-detail-hero loading" style="background-image: url('../images/movie-backdrop.jpg')" alt="Movie Backdrop">
            <div class="movie-detail-content fade-in">
                <h1 class="movie-title-large"></h1>
                <div class="movie-meta-info">
                    <span class="meta-item release-date">
                        <i class="fas fa-calendar"></i>
                        <span>Loading...</span>
                    </span>
                    <span class="meta-item duration">
                        <i class="fas fa-clock"></i>
                        <span>Loading...</span>
                    </span>
                    <span class="meta-item genre">
                        <i class="fas fa-film"></i>
                        <span>Loading...</span>
                    </span>
                    <div class="movie-rating">
                        <i class="fas fa-star"></i>
                        <span class="rating-value">Loading...</span>
                    </div>
                </div>
                <p id="plotSummary" class="movie-description">Loading movie details...</p>
                <div class="movie-actions">
                    <button class="play-button" disabled>
                        <i class="fas fa-play"></i> Loading...
                    </button>
                    <button class="add-watchlist" disabled>
                        <i class="fas fa-plus"></i> Add to Watchlist
                    </button>
                </div>
            </div>
        </section>

        <!-- Cast Section -->
        <section class="cast-section">
            <div class="container">
                <div class="section-header">
                    <h2><i class="fas fa-users"></i> Top Cast</h2>
                </div>
                <div id="castLoading" class="loading-container">
                    <div class="loading-spinner"></div>
                </div>
                <div class="cast-grid" id="castList"></div>
            </div>
        </section>

        <!-- Trailer Section -->
        <section class="trailer-section">
            <div class="container">
                <div class="section-header">
                    <h2><i class="fas fa-play-circle"></i> Trailer</h2>
                </div>
                <div id="trailerLoading" class="loading-container">
                    <div class="loading-spinner"></div>
                </div>
                <div class="video-container">
                    <!-- Trailer will be loaded here -->
                </div>
            </div>
        </section>

        <!-- Similar Movies Section -->
        <section class="similar-movies">
            <div class="container">
                <div class="section-header">
                    <h2><i class="fas fa-film"></i> You May Also Like</h2>
                </div>
                <div id="similarLoading" class="loading-container">
                    <div class="loading-spinner"></div>
                </div>
                <div class="movie-grid">
                    <!-- Similar movies will be loaded here -->
                </div>
            </div>
        </section>

        <!-- Error Message Template -->
        <div id="errorMessage" class="error-message hidden">
            <i class="fas fa-exclamation-circle"></i>
            <h2>Something went wrong</h2>
            <p class="error-details"></p>
            <button class="cta-button" onclick="window.location.href='movies.html'">
                <i class="fas fa-arrow-left"></i> Back to Movies
            </button>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner"></div>
            <p>Loading movie details...</p>
        </div>
    </main>

    <script src="../js/components/toast.js" defer></script>
    <script src="../js/script.js" defer></script>
</body>
</html>
